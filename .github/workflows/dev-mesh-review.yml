# Dev-mesh · Maintainer → Reviewer (review) — Phase 0.
# Ask-only review of an open PR: correctness, tests, scope, and the security
# invariants. Comments only — it never edits or merges.
#
# SECURITY (§15 F4): triggered by `pull_request` (the safe trigger — never the
# secret-bearing "pwn request" variant) plus a job-level same-repo guard, so a fork
# PR never runs with the base repo's secrets/token. Fork PRs get, at most, a
# read-only review without secrets; repo contents stay read-only.
# Spec: docs/superpowers/specs/2026-06-14-self-hosting-dev-mesh-design.md §6/§15
name: dev-mesh-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dev-mesh-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # No secrets to forks: only same-repo PRs run this job.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN="$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')"
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: Drive Maintainer → Reviewer (review the diff)
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Model via repo variable (vars.DEV_MESH_MODEL) with a Sonnet fallback. The
          # action otherwise forces Opus 4.8, which THIS key cannot access (instant
          # is_error/$0). Change the model by setting the DEV_MESH_MODEL repo variable.
          claude_args: |
            --model ${{ vars.DEV_MESH_MODEL || 'sonnet' }}
            --allowedTools "Read,Grep,Glob,Bash(gh:*)"
          prompt: |
            You are the **Reviewer** of the agent_mesh Dev-mesh. Read your role at
            `dev-mesh/reviewer/AGENT.md` and skills code-review + security-review.

            Review PR #${{ github.event.pull_request.number }}: correctness, test coverage
            (incl. the negative/safety case), minimal scope, and spec conformance. Then run
            `security-review` against the PROJECT.md invariants — anti-spoof surface, no
            Bash in `do`, single writable root + path-guard canonicalization, external
            content treated as data, failure-is-data, and fork-PR safety in any workflow
            changes.

            Classify every finding as BLOCKING or non-blocking:
              • BLOCKING = a security-invariant violation, a correctness bug, or a
                missing/failing test for changed behavior.
              • non-blocking = style, wording, docs, naming, or optional suggestions.

            Then submit EXACTLY ONE verdict for the CURRENT commit, so the PR carries an
            honest signal instead of being stuck in a sticky CHANGES_REQUESTED:
              • If there is ANY blocking finding → `gh pr review <PR> --request-changes`
                with the blocking items (and any nits).
              • If there are NO blocking findings → `gh pr review <PR> --approve`. Put any
                non-blocking nits in the body as OPTIONAL suggestions — they must never
                withhold approval. An approval here clears a prior CHANGES_REQUESTED, so
                "green CI + this approval" is the all-clear that makes the PR merge-ready.
            Do NOT re-raise non-blocking nits already noted in an earlier pass: once the
            blocking set is empty, APPROVE and stop, so review converges instead of looping.

            You never edit files and never merge — CI (ci.yml) is the authoritative gate and
            a human performs the merge. Your job is the honest verdict, nothing more.
      - name: Verify the agent actually worked (green != healthy)
        if: always()
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        # --advisory-blocked: this is a light comment/ask role (no git/general
        # shell granted), so probing a denied command is benign noise, not a failure.
        run: node scripts/assert-run-healthy.mjs --advisory-blocked
