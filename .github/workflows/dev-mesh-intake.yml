# Dev-mesh · Analyst (intake) — Phase 0.
# Reacts to backlog Issues: discusses, drafts specs, manages lifecycle labels.
# This is the front of the approval gate (§5.3): discussion + spec only, NEVER code.
# Spec: docs/superpowers/specs/2026-06-14-self-hosting-dev-mesh-design.md §5/§6
name: dev-mesh-intake

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  schedule:
    - cron: '5,35 * * * *' # poll: advance stuck pre-approval issues toward spec:in-review
  workflow_dispatch:

# Discuss + draft specs + manage labels + commit spec documents to a branch so the
# Analyst can open spec PRs without a human hand-off. contents stays read (GITHUB_TOKEN
# is still blocked from writing); git push uses DEV_MESH_PAT credentials configured
# by the checkout step. Scope discipline (only docs/superpowers/specs/) is enforced
# by the prompt — the same trust level as the Coder for code commits.
permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: dev-mesh-intake-${{ github.event.issue.number || 'poll' }}
  cancel-in-progress: true # dedupe: opening an issue *with* a label fires opened+labeled

jobs:
  intake:
    runs-on: ubuntu-latest
    # Ignore the society's own bot comments to avoid a self-trigger loop.
    if: github.event.sender.type != 'Bot'
    steps:
      - uses: actions/checkout@v4
        with:
          # Push spec branches via DEV_MESH_PAT (same pattern as dev-mesh-backlog.yml).
          # The GITHUB_TOKEN permissions keep contents: read (code pushes stay blocked);
          # only the PAT has write access, so only the prompt-scoped Analyst can push.
          # Falls back to GITHUB_TOKEN when the secret is absent (spec PRs stay blocked
          # until DEV_MESH_PAT is configured — non-breaking, just requires human handoff).
          token: ${{ secrets.DEV_MESH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN="$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')"
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: Back-off on retry (jitter for 529 recovery)
        uses: ./.github/actions/mesh-retry-backoff
      - name: Drive the Analyst (discuss → spec → labels)
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Model via repo variable (vars.DEV_MESH_MODEL) with a Sonnet fallback. The
          # action otherwise forces Opus 4.8, which THIS key cannot access (instant
          # is_error/$0). Change the model by setting the DEV_MESH_MODEL repo variable.
          # WebSearch,WebFetch: the Analyst's research-landscape skill runs deep research
          # (fan-out search → fetch → verify). Without these, scheduled polls that hit the
          # research path accumulate permission denials until the postrun gate fails (#266).
          claude_args: |
            --model ${{ vars.DEV_MESH_MODEL || 'sonnet' }}
            --allowedTools "Read,Grep,Glob,Edit,Write,WebSearch,WebFetch,Bash(gh:*),Bash(git:*)"
          prompt: |
            You are the **Analyst** of the agent_mesh Dev-mesh. Read your role at
            `dev-mesh/analyst/AGENT.md` and skills under `dev-mesh/analyst/skills/`.
            The backlog is GitHub Issues, each in exactly one label-encoded state
            (idea → discussing → spec:draft → spec:in-review → approved → …). The label
            conventions live in `dev-mesh/backlog.md`.

            DETERMINE SCOPE:
            - Event-triggered: act on issue #${{ github.event.issue.number }} (the one that
              changed).
            - Scheduled poll / manual dispatch (no specific issue): run
              `gh issue list --state open --json number,title,labels` and select OPEN issues
              still in a PRE-APPROVAL state (`idea`, `discussing`, `spec:draft`). Advance up to
              3 of them (FIFO by number) this run — this is the continuous pump that moves the
              backlog to the human approval gate without anyone nudging each issue.

            For each in-scope issue, move it forward by ONE honest step toward review:
            `idea` → clarify/scope it (`discussing`); `discussing`/`spec:draft` → when scope is
            clear, write a ready spec (skill `write-spec`) and set `spec:in-review`. First
            DEDUPE against other open/closed issues; if an issue is a duplicate or clearly not
            worth pursuing, label it `rejected`, close it with a one-line reason, and move on.
            Always leave each issue's lifecycle label matching reality.

            SPEC PR FLOW: when a spec is ready, commit it under `docs/superpowers/specs/`
            on a new branch (`spec/issue-<N>`), push with `git push`, and open a spec PR
            with `gh pr create`. ONLY touch `docs/superpowers/specs/` — never modify source
            code, tests, workflows, or any file outside that directory.

            HARD RULE (approval gate, §5.3): do NOT implement anything. No code edits, no
            code branch, NEVER set `approved` — only a human grants approval. You produce
            discussion, specs, label transitions, and dupe/dead-idea rejections only. The only
            thing that should reach a human is an issue at `spec:in-review`.

            HARD RULE (post-approval is off-limits, #248): your role ENDS at the `spec:in-review`
            human gate. If an issue ALREADY carries the `approved` label, do NOT touch its labels
            at all — do not remove `spec:in-review`, do not add or strip anything, just skip it.
            Once a human approves, the issue belongs to the build pipeline; removing its
            `spec:in-review` after approval severs its only route to the coder (it has no
            code-type) and deadlocks it. "Leave labels matching reality" NEVER applies to an
            approved issue.
      - name: Verify the agent worked + capture usage
        if: always()
        uses: ./.github/actions/agent-postrun
        with:
          execution_file: ${{ steps.claude.outputs.execution_file }}
          advisory_blocked: "false"
