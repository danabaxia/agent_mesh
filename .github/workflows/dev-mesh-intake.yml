# Dev-mesh · Analyst (intake) — Phase 0.
# Reacts to backlog Issues: discusses, drafts specs, manages lifecycle labels.
# This is the front of the approval gate (§5.3): discussion + spec only, NEVER code.
# Spec: docs/superpowers/specs/2026-06-14-self-hosting-dev-mesh-design.md §5/§6
name: dev-mesh-intake

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  schedule:
    - cron: '5,35 * * * *' # poll: advance stuck pre-approval issues toward spec:in-review
  workflow_dispatch:

# Discuss + draft specs + manage labels. May open a spec PR (pull-requests: write)
# but must NOT push code to the repo — read-only repo contents keeps the approval
# gate honest.
permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: dev-mesh-intake-${{ github.event.issue.number || 'poll' }}
  cancel-in-progress: true # dedupe: opening an issue *with* a label fires opened+labeled

jobs:
  intake:
    runs-on: ubuntu-latest
    # Ignore the society's own bot comments to avoid a self-trigger loop.
    if: github.event.sender.type != 'Bot'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN="$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')"
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: Drive the Analyst (discuss → spec → labels)
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Model via repo variable (vars.DEV_MESH_MODEL) with a Sonnet fallback. The
          # action otherwise forces Opus 4.8, which THIS key cannot access (instant
          # is_error/$0). Change the model by setting the DEV_MESH_MODEL repo variable.
          claude_args: |
            --model ${{ vars.DEV_MESH_MODEL || 'sonnet' }}
            --allowedTools "Read,Grep,Glob,Edit,Write,Bash(gh:*)"
          prompt: |
            You are the **Analyst** of the agent_mesh Dev-mesh. Read your role at
            `dev-mesh/analyst/AGENT.md` and skills under `dev-mesh/analyst/skills/`.
            The backlog is GitHub Issues, each in exactly one label-encoded state
            (idea → discussing → spec:draft → spec:in-review → approved → …). The label
            conventions live in `dev-mesh/backlog.md`.

            DETERMINE SCOPE:
            - Event-triggered: act on issue #${{ github.event.issue.number }} (the one that
              changed).
            - Scheduled poll / manual dispatch (no specific issue): run
              `gh issue list --state open --json number,title,labels` and select OPEN issues
              still in a PRE-APPROVAL state (`idea`, `discussing`, `spec:draft`). Advance up to
              3 of them (FIFO by number) this run — this is the continuous pump that moves the
              backlog to the human approval gate without anyone nudging each issue.

            For each in-scope issue, move it forward by ONE honest step toward review:
            `idea` → clarify/scope it (`discussing`); `discussing`/`spec:draft` → when scope is
            clear, write a ready spec (skill `write-spec`) and set `spec:in-review`. First
            DEDUPE against other open/closed issues; if an issue is a duplicate or clearly not
            worth pursuing, label it `rejected`, close it with a one-line reason, and move on.
            Always leave each issue's lifecycle label matching reality.

            HARD RULE (approval gate, §5.3): do NOT implement anything. No code edits, no
            code branch, NEVER set `approved` — only a human grants approval. You produce
            discussion, specs, label transitions, and dupe/dead-idea rejections only. The only
            thing that should reach a human is an issue at `spec:in-review`.
      - name: Verify the agent actually worked (green != healthy)
        if: always()
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        # --advisory-blocked: this is a light comment/ask role (no git/general
        # shell granted), so probing a denied command is benign noise, not a failure.
        run: node scripts/assert-run-healthy.mjs --advisory-blocked
