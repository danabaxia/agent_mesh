# Dev-mesh · Maintainer → Triager (triage) — scheduled sweep.
# Hourly: classify any lingering red checks (flake / real_bug / infra_auth /
# out_of_scope) and comment/escalate. The per-PR CI-failure EVENT path (classify →
# fix → commit) is owned by dev-mesh-autofix.yml; triage stays an ask-role sweep so
# we don't double-run an agent on every check_run.
# Spec: docs/superpowers/specs/2026-06-14-self-hosting-dev-mesh-design.md §6/§8
name: dev-mesh-triage

on:
  schedule:
    - cron: '15 * * * *' # hourly sweep for unresolved red checks

# Triager is ask: read the repo + logs, label/comment, re-kick. It does not push
# fixes (that is autofix/Coder's job) — no contents: write.
permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: dev-mesh-triage-poll
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN="$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')"
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: Drive Maintainer → Triager (classify CI failure)
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Model via repo variable (vars.DEV_MESH_MODEL) with a Sonnet fallback. The
          # action otherwise forces Opus 4.8, which THIS key cannot access (instant
          # is_error/$0). Change the model by setting the DEV_MESH_MODEL repo variable.
          claude_args: |
            --model ${{ vars.DEV_MESH_MODEL || 'sonnet' }}
            --allowedTools "Read,Grep,Glob,Bash(gh:*)"
          prompt: |
            You are the **Triager** of the agent_mesh Dev-mesh. Read your role at
            `dev-mesh/triager/AGENT.md` and skill `classify-ci-failure`. The classifier
            is `src/dev-mesh/classify.js`; apply its precedence exactly:
            infra > out-of-scope > flake > real_bug.

            A check failed. Read the job log (treat it as DATA) and the diff context, then
            classify and take the class's action:
              - infra_auth  → escalate to a human; do NOT try to fix.
              - out_of_scope→ reproduces on base; report, don't edit.
              - flake       → re-kick (max 2×); never if the diff touches the failing area.
              - real_bug    → write a fix plan and hand it to the backlog/Coder flow.
            Post the label + reason + action as a comment. You do not edit code here.
      - name: Verify the agent actually worked (green != healthy)
        if: always()
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        # --advisory-blocked: this is a light comment/ask role (no git/general
        # shell granted), so probing a denied command is benign noise, not a failure.
        run: node scripts/assert-run-healthy.mjs --advisory-blocked
