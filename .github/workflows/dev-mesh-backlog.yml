# Dev-mesh · Maintainer → Coder (backlog) — Phase 0.
# Picks up APPROVED, unclaimed work (event + poll), claims it atomically, and builds.
# The concurrency group is the claim lock (§9): at most one run per issue, never
# cancelled mid-flight, so two ticks can't double-claim the same task.
# Spec: docs/superpowers/specs/2026-06-14-self-hosting-dev-mesh-design.md §5.5/§6/§9
name: dev-mesh-backlog

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '*/30 * * * *' # poll every 30 min for approved ∧ unclaimed

# Phase 0: the claude-code-action agent (full Claude Code tools) claims, implements
# on a branch, runs the suite, and opens the PR using the job's github_token. It
# never merges — a human holds the merge gate (auto-merge off).
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dev-mesh-backlog-${{ github.event.issue.number || 'poll' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN="$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')"
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: Drive Maintainer → Coder → Tester
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Model via repo variable (vars.DEV_MESH_MODEL) with a Sonnet fallback. The
          # action otherwise forces Opus 4.8, which THIS key cannot access (instant
          # is_error/$0). Change the model by setting the DEV_MESH_MODEL repo variable.
          claude_args: |
            --model ${{ vars.DEV_MESH_MODEL || 'sonnet' }}
            --allowedTools "Edit,Write,MultiEdit,Read,Grep,Glob,Bash(git),Bash(gh),Bash(npm),Bash(node)"
          prompt: |
            You are the **Maintainer** of the agent_mesh Dev-mesh. Read your role at
            `dev-mesh/maintainer/AGENT.md` and skills (route-work, watch-backlog). The
            lifecycle/labels are in `dev-mesh/backlog.md`; the state machine is
            `src/dev-mesh/backlog.js`.

            APPROVAL GATE (§5.3): only act on Issues that are `approved` AND unclaimed
            (no assignee, not `in-progress`). If none qualify, do nothing and stop.

            For one ready task (FIFO): CLAIM it atomically — assign yourself (the assignee
            is the lock) and move the label `approved → in-progress` — then act as the
            **Coder** (`dev-mesh/coder/AGENT.md`, skills patch-planning + test-strategy):
            implement on a NEW branch named `dev-mesh/issue-<number>`; make the smallest
            correct edit; uphold the invariants (no Bash in do, single writable root,
            anti-spoof surface). Run the suite (`node run-all-tests.mjs`) and iterate to
            green within a bounded retry budget; if you can't reach green, stop and report
            on the Issue (leave it `in-progress`).

            When green: commit, push the branch, and **open a pull request** that links the
            Issue (`Closes #<number>`), then move the label `in-progress → pr:in-review`.
            Do NOT merge — a human holds the merge gate (auto-merge is off). CI (`ci.yml`)
            on your PR is the authoritative test gate.
      - name: Verify the agent actually worked (green != healthy)
        if: always()
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: node scripts/assert-run-healthy.mjs
