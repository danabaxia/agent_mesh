# Dev-mesh · mergefix — Coder resolves a PR that can't merge (conflicts with main).
# When main moves (or on a schedule), find an open same-repo PR whose mergeStateStatus
# is DIRTY (conflicting) and have the Coder: merge main → resolve conflicts → run the
# suite green → commit ([mergefix]) → push. One PR per run; <=2 [mergefix] commits per
# branch (counted on the BRANCH only, not all history); never force-pushes; never merges.
#
# No loop: GITHUB_TOKEN pushes don't re-trigger workflows. Conflicts in memory
# quick.json (a keyed JSON object) are unioned; code conflicts get a minimal correct
# resolution or the agent aborts and reports.
# Spec: docs/superpowers/specs/2026-06-14-self-hosting-dev-mesh-design.md §6
name: dev-mesh-mergefix

on:
  push:
    branches: [main]   # base moved → open PRs may now conflict
  schedule:
    - cron: '45 * * * *' # hourly backstop
  workflow_dispatch:

permissions:
  contents: write       # push the resolved merge to the PR branch
  pull-requests: write  # comment

concurrency:
  group: dev-mesh-mergefix
  cancel-in-progress: false

jobs:
  mergefix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push via DEV_MESH_PAT (workflows scope) so a conflict resolution that touches
          # .github/workflows/** can be pushed (the Actions GITHUB_TOKEN is barred from
          # workflow files). Falls back to GITHUB_TOKEN when the secret is absent.
          token: ${{ secrets.DEV_MESH_PAT || secrets.GITHUB_TOKEN }}
      - name: Find a conflicting (DIRTY) same-repo PR
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh pr list --base main --state open \
                 --json number,headRefName,isCrossRepository,isDraft,mergeStateStatus \
                 --jq '[.[] | select(.isCrossRepository==false and .isDraft==false and .mergeStateStatus=="DIRTY")][0] // empty')
          if [ -z "$pr" ]; then
            echo "no conflicting same-repo PR"; echo "none=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "number=$(echo "$pr" | jq -r .number)" >> "$GITHUB_OUTPUT"
          echo "head=$(echo "$pr" | jq -r .headRefName)" >> "$GITHUB_OUTPUT"
          echo "picked PR #$(echo "$pr" | jq -r .number) ($(echo "$pr" | jq -r .headRefName))"
      - name: Mergefix budget (deterministic — <=2 [mergefix] commits on the BRANCH)
        if: steps.pick.outputs.none != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Author-controlled values via env: (not shell-interpolated ${{ }}) → no injection.
          HEAD_REF: ${{ steps.pick.outputs.head }}
          PR_NUMBER: ${{ steps.pick.outputs.number }}
        run: |
          # Export the branch ref for later steps without ever putting it in shell/prompt text.
          printf 'PR_BRANCH=%s\n' "$HEAD_REF" >> "$GITHUB_ENV"
          git fetch origin main "$HEAD_REF" -q
          # Count [mergefix] commits on the PR branch ONLY (origin/main..branch), so prior
          # [mergefix] commits already merged into main never lock future PRs out.
          count=$(git log --oneline --grep='\[mergefix\]' "origin/main..origin/$HEAD_REF" | wc -l | tr -d ' ')
          echo "branch [mergefix] commits: $count"
          if [ "$count" -ge 2 ]; then
            gh pr comment "$PR_NUMBER" \
              --body "🤖 mergefix budget exhausted ($count ≥ 2 \`[mergefix]\` commits on the branch) — needs a human."
            echo "BUDGET_EXHAUSTED=true" >> "$GITHUB_ENV"
          fi
      - uses: actions/setup-node@v4
        if: steps.pick.outputs.none != 'true' && env.BUDGET_EXHAUSTED != 'true'
        with:
          node-version: 20
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        if: steps.pick.outputs.none != 'true' && env.BUDGET_EXHAUSTED != 'true'
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN="$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')"
          if [ -z "$CLEAN" ]; then echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is required for mergefix"; exit 1; fi
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: Merge main into PR branch
        if: steps.pick.outputs.none != 'true' && env.BUDGET_EXHAUSTED != 'true' && github.event_name != 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # $PR_BRANCH is already in $GITHUB_ENV (exported by the budget step).
          # Using it here in a plain bash run: step is safe — no agent Bash tool involved.
          git checkout "$PR_BRANCH"
          git reset --hard "origin/$PR_BRANCH"
          if git merge origin/main; then
            echo "CONFLICTS_FOUND=false" >> "$GITHUB_ENV"
            echo "No conflicts — Drive Coder will be skipped."
          else
            merge_exit=$?
            # Distinguish real conflicts (exit 1, unresolved files) from hard git errors
            # (exit 128+, e.g. bad ref or detached HEAD) — don't invoke Drive Coder against
            # an undefined repo state.
            if git ls-files -u | grep -q .; then
              echo "CONFLICTS_FOUND=true" >> "$GITHUB_ENV"
              echo "Conflicts detected; leaving repo in mid-merge state for Drive Coder."
            else
              echo "::error::git merge failed with exit $merge_exit but no unresolved files — hard git error, aborting." >&2
              exit 1
            fi
          fi
      - name: Drive Coder (resolve the conflict with main)
        if: steps.pick.outputs.none != 'true' && env.CONFLICTS_FOUND == 'true' && env.BUDGET_EXHAUSTED != 'true' && github.event_name != 'push'
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.DEV_MESH_PAT || secrets.GITHUB_TOKEN }}
          # Model via repo variable (vars.DEV_MESH_MODEL) with a Sonnet fallback.
          claude_args: |
            --model ${{ vars.DEV_MESH_MODEL || 'sonnet' }}
            --allowedTools "Edit,Write,MultiEdit,Read,Grep,Glob,Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(node:*)"
          prompt: |
            PR #${{ steps.pick.outputs.number }} conflicts with `main` and needs resolution.
            The branch is already checked out and `git merge origin/main` has been run —
            the repo is in a mid-merge/conflict state. You are the **Coder** resolving it.
            In THIS GitHub Actions context you run git/npm/node yourself (this is not the
            no-shell mesh role).

            Resolve it:
              1. Find every conflicted file: run `git diff --name-only --diff-filter=U` or
                 look for `<<<<<<<` conflict markers via Grep/Read.
              2. Resolve EVERY conflict:
                 - `**/memory/quick.json` (a keyed JSON object) → UNION both sides' keys (keep all
                   lessons), valid JSON within the caps.
                 - code / tests → the minimal correct COMBINED result (honour both intents).
                 If a conflict can't be resolved safely → `git merge --abort`, comment on PR
                 #${{ steps.pick.outputs.number }} what's blocking, and STOP.
              3. Run `node run-all-tests.mjs` until green; commit all resolved changes
                 with a `[mergefix]` message (never force-push, never merge the PR).
                 Comment a one-line summary on PR #${{ steps.pick.outputs.number }}.
                 Do NOT push — the push is handled automatically after this step.
      - name: Verify the agent worked + capture usage
        if: always() && steps.claude.outcome != 'skipped'
        uses: ./.github/actions/agent-postrun
        with:
          execution_file: ${{ steps.claude.outputs.execution_file }}
          advisory_blocked: "false"
      - name: Push resolved merge
        if: steps.pick.outputs.none != 'true' && env.CONFLICTS_FOUND == 'true' && steps.claude.outcome == 'success'
        run: |
          # $PR_BRANCH is in $GITHUB_ENV (exported by the Mergefix budget step).
          git push origin "HEAD:$PR_BRANCH"
