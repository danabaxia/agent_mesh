name: CI

# The per-PR L0 hermetic gate. The suite is zero-dependency (no npm install —
# package.json has no deps by design) and stubs `claude`, so runners need only Node.
#
# run-all-tests.mjs is the sequential per-file runner: each test file gets its
# own `node --test` process and a hard 240s timeout, so one wedged spawn-heavy
# file cannot hang the job (the Windows-stability lesson — see CLAUDE.md).
# Windows is a first-class target here (.cmd spawn shims, transcript-path
# encoding), hence the OS matrix.
#
# Actions-minute budget (private repo: Windows bills 2x): the FULL cross-platform
# matrix runs where it matters — on pull_request (the merge gate) and on manual
# dispatch. Pushes only trigger on the trunk `main` (post-merge integration smoke
# already gated by the PR), and there they run Linux-only. Feature-branch pushes
# don't trigger CI at all — their open PR is the gate. This roughly halves routine
# consumption WITHOUT weakening the gate: every PR still gets the full
# ubuntu+windows × node 20/22 matrix before it can merge.
#
# Trunk-based development: `main` is the single living line. The retired
# `vN-development` lines are gone from the triggers; a future release branch that
# needs CI can be added here when it's cut.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pick the OS/Node matrix from the event. pull_request + workflow_dispatch get
  # the full cross-platform matrix (the gate); a push to a protected line gets a
  # cheap Linux-only smoke (it is post-merge code the PR already gated on Windows).
  matrix:
    name: pick matrix
    runs-on: ubuntu-latest
    # memory:promote PRs only touch dev-mesh/<role>/memory/quick.json (DATA): skip the heavy
    # ubuntu+windows × node matrix for them — they get the lightweight validate-memory job
    # below + auto-merge via dev-mesh-memory-automerge.yml. (Replaces the old paths-ignore,
    # which would also have suppressed validate-memory.) Safe against fork abuse: only a
    # collaborator (triage+) can apply the memory:promote label, so a fork can't self-skip CI.
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'memory:promote')
    outputs:
      include: ${{ steps.pick.outputs.include }}
    steps:
      - id: pick
        shell: bash
        run: |
          full='[{"os":"ubuntu-latest","node":20},{"os":"ubuntu-latest","node":22},{"os":"windows-latest","node":20},{"os":"windows-latest","node":22}]'
          linux='[{"os":"ubuntu-latest","node":20},{"os":"ubuntu-latest","node":22}]'
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "include=$linux" >> "$GITHUB_OUTPUT"
          else
            echo "include=$full" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: matrix
    # Skip when the matrix job was skipped (memory:promote PRs); otherwise this job would
    # try to fan out an empty matrix.
    if: needs.matrix.result == 'success'
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node run-all-tests.mjs

  # Lightweight gate that runs on EVERY push/PR (incl. memory:promote PRs, which skip the
  # matrix above): fails when any dev-mesh/<role>/memory/quick.json violates the field
  # caps/shape, so an over-cap l0 is caught at write time — not later when the validator
  # ships. Issue #41.
  validate-memory:
    runs-on: ubuntu-latest
    timeout-minutes: 3   # trivially fast (parse small JSON); ceiling so a hung runner can't hold the PR
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate quick.json files
        shell: bash
        run: |
          # bash array (not `ls` + word-splitting): role dirs with a space/glob char can't
          # split into wrong args. If the glob matches nothing, files[0] is the literal
          # pattern (which doesn't exist) → exit 0.
          files=(dev-mesh/*/memory/quick.json)
          [[ -e "${files[0]}" ]] || exit 0
          node scripts/validate-quick-memory.mjs "${files[@]}"
