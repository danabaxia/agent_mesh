# Dev-mesh · memory auto-merge — the memory-only auto-merge path (quick.json, never code).
# A SCHEDULED sweep (not pull_request): GitHub's recursion guard means a memory:promote
# PR opened by the Curator with GITHUB_TOKEN would NOT fire a pull_request workflow, so a
# `schedule` trigger is the robust way to pick them up. For each open same-repo
# memory:promote PR it: guards that EVERY changed file is under dev-mesh/<role>/memory/
# (so it can NEVER merge code), validates quick.json (caps/shape), then squash-merges.
#
# Deliberate, tightly-scoped exception to the no-auto-merge invariant (PROJECT.md):
# memory DATA only (the Curator's distilled lessons, recalled as DATA, never executed).
name: dev-mesh-memory-automerge

on:
  schedule:
    - cron: '*/30 * * * *' # sweep every 30 min (relaxed from */15: bounded backstop, #430 P8)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dev-mesh-memory-automerge
  cancel-in-progress: false

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Auto-merge valid memory:promote PRs (memory data only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --label memory:promote \
                  --json number,isCrossRepository --jq '.[] | select(.isCrossRepository==false) | .number')
          if [ -z "$prs" ]; then echo "no open memory:promote PRs"; exit 0; fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          for pr in $prs; do
            echo "::group::PR #$pr"
            files=$(gh pr view "$pr" --repo "$GITHUB_REPOSITORY" --json files --jq '.files[].path')
            # Structural guard: every changed file must be a memory quick.json OR a memory
            # *.md doc (the Curator's pattern files — inert DATA, never executed). NOT merely
            # "under memory/": a file like dev-mesh/x/memory/evil.js must still go to a human
            # (it would escape the quick.json validation below — Reviewer #21). The *.md branch
            # is ([^/]+/)?[^/]+\.md — a flat doc or one subdir (workflows/*.md), NOT arbitrary
            # nesting (in ERE '.' matches '/', so '.+\.md' would admit a/b/c/evil.md). Anything
            # that isn't quick.json or such an *.md → human review.
            if [ -z "$files" ] || echo "$files" | grep -vqE '^dev-mesh/[^/]+/memory/(quick\.json|([^/]+/)?[^/]+\.md)$'; then
              echo "#$pr has non-memory-data changes — leaving for human review"; echo "::endgroup::"; continue
            fi
            if ! gh pr checkout "$pr" >/dev/null 2>&1; then
              echo "#$pr checkout failed (maybe conflicting — mergefix will handle)"; echo "::endgroup::"; continue
            fi
            # Fetch main INSIDE the loop: if an earlier iteration merged a PR, this picks up
            # that squash commit so this PR's merge simulation is against current main.
            git fetch origin main -q
            # Validate the MERGE RESULT, not the stale branch HEAD. A PR branched before a
            # fix to quick.json (e.g. an over-cap l0 trim) still carries the old invalid file
            # on its HEAD, yet merges cleanly — validating HEAD would wrongly refuse it forever
            # (mergefix only touches DIRTY PRs, so nothing would ever refresh it). Merge main
            # in first; a real conflict → leave it for mergefix.
            if ! git merge origin/main --no-edit -q; then
              # Memory PRs collide on quick.json constantly (every promotion edits it). Resolve
              # deterministically IN-LINE: union-quick-memory.mjs unions quick.json (newer
              # provenance.ts wins, LRU-evict over cap) and line-unions memory *.md. It exits 3
              # for ANY non-memory conflict (code is NEVER auto-resolved) — then defer to mergefix.
              # On success we complete the merge and push it to the PR branch so the server-side
              # squash-merge below sees a clean, non-conflicting PR.
              if node scripts/union-quick-memory.mjs; then
                git commit --no-edit -q
                branch=$(gh pr view "$pr" --repo "$GITHUB_REPOSITORY" --json headRefName --jq .headRefName)
                if git push origin "HEAD:$branch" -q; then
                  echo "#$pr: auto-resolved memory conflict by union"
                else
                  echo "#$pr push of resolved merge failed — mergefix will handle"
                  git checkout - >/dev/null 2>&1 || true; echo "::endgroup::"; continue
                fi
              else
                echo "#$pr conflict not auto-resolvable here (non-memory or invalid) — mergefix will handle"
                git merge --abort 2>&1 || echo "merge --abort failed; git state may be inconsistent"
                git checkout - >/dev/null 2>&1 || true; echo "::endgroup::"; continue
              fi
            fi
            # bash array (not git ls-files + word-splitting): a path with a space or glob
            # char would break unquoted expansion (shellcheck SC2086/SC2012). Glob the
            # worktree directly — covers every tracked role after merging main above. If
            # the glob matches nothing, qjs[0] is the literal pattern (non-existent) and
            # we skip to avoid passing a garbage arg to the validator.
            qjs=(dev-mesh/*/memory/quick.json)
            if [[ ! -e "${qjs[0]}" ]]; then
              # No quick.json in the merged tree (e.g. an .md-only PR before any role has one).
              # Do NOT silently re-skip every sweep — leave the author feedback so it isn't a
              # dead-end (preserves the old "no quick.json → needs a human" intent without
              # passing a garbage arg to the validator).
              echo "#$pr has no quick.json in the merged tree — needs a human"
              gh pr comment "$pr" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 memory auto-merge skipped: no quick.json found in the merged tree — needs a human."
            elif node scripts/validate-quick-memory.mjs "${qjs[@]}"; then
              # NB: gh squash-merges the PR HEAD onto main server-side, not our local merge
              # commit — so this is validated against an APPROXIMATION of the final state. The
              # concurrency group serialises sweeps and the per-loop fetch accounts for prior
              # merges, so the only residual gap is a dispatch racing a scheduled fire; a cap
              # overshoot there is a formatting issue the next sweep re-flags, not a security one.
              # GitHub computes mergeability LAZILY: right after we push the union-resolved
              # merge above, `gh pr merge` transiently reports "not mergeable yet" even though
              # the PR is now clean. A single attempt then defers to "next sweep" — but by then
              # a newer clean memory PR has merged and advanced main, re-conflicting THIS PR, so
              # older conflicting PRs STARVE forever (e.g. #259 sat 3.7h across 5+ sweeps while
              # #284/#285/#287 merged immediately). Retry with a short backoff so the
              # union-resolved PR settles and merges in THIS sweep. A genuine conflict reports
              # mergeable=CONFLICTING (not just a failed merge call) — break early on that and
              # defer to mergefix rather than burning the whole backoff.
              merged=""
              for attempt in 1 2 3 4 5 6; do
                if gh pr merge "$pr" --repo "$GITHUB_REPOSITORY" --squash --delete-branch; then
                  echo "merged memory PR #$pr"; merged=1; break
                fi
                if [ "$(gh pr view "$pr" --repo "$GITHUB_REPOSITORY" --json mergeable --jq .mergeable 2>/dev/null)" = "CONFLICTING" ]; then
                  echo "#$pr genuinely conflicting — defer to mergefix"; break
                fi
                echo "#$pr not mergeable yet (attempt $attempt — GitHub recomputing mergeability)"; sleep 6
              done
              [ -z "$merged" ] && echo "#$pr not merged this sweep — mergefix/next sweep will retry"
            else
              gh pr comment "$pr" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 memory auto-merge skipped: quick.json failed validateQuickMemory even after merging main — needs a human."
            fi
            git checkout - >/dev/null 2>&1 || true
            echo "::endgroup::"
          done
