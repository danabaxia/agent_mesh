name: Integration (nightly)

# SEPARATE from ci.yml (the per-PR L0 hermetic gate). This pipeline runs the
# Evaluation Methodology's integration tier against a REAL `claude`, on a
# schedule — it NEVER gates per-PR merges. Spec:
# docs/superpowers/specs/2026-06-13-integration-test-pipeline-design.md
#
# Tiers (ascending cost):
#   L1 real-claude e2e        — gates the nightly (deterministic pass/fail)
#   L2 behavior eval          — record-only scorecard (artifact + summary)
#   L3 adversarial battery    — gates WHEN PRESENT (security, --min-pass-rate 1.0)
#   L4 performance benchmark  — record-only scorecard
# L3/L4 are skip-guarded on their script's existence, so this ships before
# backlog #3/#4 land and lights up automatically once they do.
#
# DEFAULT-BRANCH CAVEAT: GitHub `schedule` triggers fire only from the repo's
# DEFAULT branch (`main`). Under trunk-based development `main` IS the single
# living line, so the integration tier evaluates `main` directly — jobs check out
# `INTEGRATION_REF` (= `main`) explicitly so a `workflow_dispatch` from any ref
# still tests the trunk. (Historically this tracked a `vN-development` line; that
# model is retired.) Auth is OAuth-only and fail-fast: a missing
# CLAUDE_CODE_OAUTH_TOKEN secret errors out clearly rather than timing out per tier.

on:
  schedule:
    - cron: '0 7 * * *'         # nightly (UTC), after a day's merges land
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: false      # never cancel a half-finished scorecard

permissions:
  contents: read

env:
  # The branch the integration tier always evaluates (see DEFAULT-BRANCH CAVEAT).
  # Trunk-based development: the nightly validates `main`, not a retired vN-development line.
  INTEGRATION_REF: main

jobs:
  l1-e2e:
    name: L1 real-claude e2e (gates)
    runs-on: ubuntu-latest        # real-claude tiers are POSIX-first (demo-e2e is POSIX-only)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.INTEGRATION_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install claude CLI
        run: npm i -g @anthropic-ai/claude-code
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN=$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')
          if [ -z "$CLEAN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is required for integration."
            exit 1
          fi
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
          claude --version
      - name: Auth smoke — surface the real claude error (diagnostic, non-fatal)
        run: |
          # `claude --version` needs no auth, so it passing tells us nothing about
          # whether `claude -p` can actually reach Claude. The L1/L2 tiers were all
          # failing in <1.5s with status 'error' — i.e. claude exits before any model
          # turn. This step runs ONE real `claude -p` and prints its stdout+stderr so
          # the actual cause (auth/permission/credit/config) is visible in the log.
          # Non-fatal (exit 0) so the real e2e still runs and we get full diagnostics.
          set +e
          echo "--- claude -p smoke (stdout+stderr) ---"
          OUT=$(claude -p "Reply with the single word OK." --output-format json 2>&1)
          CODE=$?
          echo "$OUT"
          echo "--- claude -p exit code: $CODE ---"
          if [ "$CODE" -ne 0 ]; then
            echo "::error::claude -p failed (exit $CODE) — real error printed above; L1 e2e will fail until OAuth auth is fixed."
          fi
          exit 0
      - name: L1 — demo e2e (real claude delegates a real write across folders)
        run: AGENT_MESH_E2E=1 node --test test/demo-e2e.test.js
      - name: L1 — mesh e2e (real claude peer-selection + two-hop over stdio A2A)
        run: AGENT_MESH_E2E=1 node --test test/eval-mesh-e2e.test.js

  l2-behavior:
    name: L2 behavior eval scorecard (record-only)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.INTEGRATION_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install claude CLI
        run: npm i -g @anthropic-ai/claude-code
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN=$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')
          if [ -z "$CLEAN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is required for integration."
            exit 1
          fi
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: L2 — A2A behavior eval (scorecard; non-gating, exits 0)
        run: node scripts/eval-a2a.mjs --trials 3 --out eval-results
      - name: Summarize scorecard
        if: always()
        run: find eval-results -name scorecard.md -exec cat {} >> "$GITHUB_STEP_SUMMARY" \; 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: l2-behavior-scorecard
          path: eval-results/
          retention-days: 14
          if-no-files-found: ignore

  l3-adversarial:
    name: L3 adversarial battery (gates when present)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.INTEGRATION_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install claude CLI
        run: npm i -g @anthropic-ai/claude-code
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN=$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')
          if [ -z "$CLEAN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is required for integration."
            exit 1
          fi
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: L3 — adversarial battery (skip until scripts/eval-adversarial.mjs lands; backlog #3)
        run: |
          if [ -f scripts/eval-adversarial.mjs ]; then
            node scripts/eval-adversarial.mjs --min-pass-rate 1.0 --out adversarial-results
          else
            echo "::notice::scripts/eval-adversarial.mjs not present yet — skipping L3 (backlog #3)."
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: l3-adversarial-results
          path: adversarial-results/
          retention-days: 14
          if-no-files-found: ignore

  l4-perf:
    name: L4 performance benchmark (record-only)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.INTEGRATION_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install claude CLI
        run: npm i -g @anthropic-ai/claude-code
      - name: Sanitize OAuth token (strip stray whitespace/newlines)
        env:
          RAW_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CLEAN=$(printf '%s' "$RAW_OAUTH" | tr -d '[:space:]')
          if [ -z "$CLEAN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is required for integration."
            exit 1
          fi
          echo "::add-mask::$CLEAN"
          echo "CLAUDE_CODE_OAUTH_TOKEN=$CLEAN" >> "$GITHUB_ENV"
      - name: L4 — performance benchmark (skip until scripts/eval-perf.mjs lands; backlog #4)
        run: |
          if [ -f scripts/eval-perf.mjs ]; then
            node scripts/eval-perf.mjs --trials 5 --out perf-results
          else
            echo "::notice::scripts/eval-perf.mjs not present yet — skipping L4 (backlog #4)."
          fi
      - name: Summarize PerfCard
        if: always()
        run: find perf-results -name perfcard.md -exec cat {} >> "$GITHUB_STEP_SUMMARY" \; 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: l4-perf-scorecard
          path: perf-results/
          retention-days: 14
          if-no-files-found: ignore
