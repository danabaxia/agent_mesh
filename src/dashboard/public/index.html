<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>agent_mesh — dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,360..600&family=JetBrains+Mono:wght@400;500;600&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/app.css" />
<link rel="stylesheet" href="/result-canvas.css" />
</head>
<body>
<div class="app">
  <header>
    <span class="brand">agent<b>_</b>mesh</span>

    <label class="scopef">scope
      <select id="scope">
        <option value="mesh">Mesh</option>
      </select>
    </label>

    <div id="stat" class="stat">
      <span><span class="dotg"></span> <b>—</b> agents</span>
    </div>

    <div class="panetog">
      <button id="t-tree" class="on" title="Toggle Explorer">▤ Files</button>
      <button id="t-center" class="on" title="Toggle Board">▦ Board</button>
      <button id="t-inspect" class="on" title="Toggle Chat">💬 Chat</button>
      <button id="t-board2" title="New board (preview)">⌗ Board v2</button>
    </div>

    <div class="layoutpre" role="group" aria-label="Layout presets">
      <button id="lay-all" class="on" title="All panes (default)">⊞</button>
      <button id="lay-widechat" title="Wide chat (chat takes ~50%)">◫</button>
      <button id="lay-board" title="Board focus (only the board)">▦</button>
      <button id="lay-chat" title="Chat focus (only chat, full width)">▢</button>
    </div>
  </header>

  <div class="body">
    <!-- LEFT: file explorer -->
    <aside class="pane tree" id="pane-tree">
      <div class="ph" id="exph">Explorer · Mesh</div>
      <div id="explorer"><div class="loading">Loading…</div></div>
    </aside>
    <div class="gutter" data-g="tree"></div>

    <!-- CENTER: kanban / graph -->
    <main class="pane center" id="pane-center">
      <div class="boardbar">
        <div class="seg typef">
          <button id="ty-agent" class="on">Agents</button>
          <button id="ty-skill">Skills</button>
          <button id="ty-mcp">MCP</button>
        </div>
        <div class="seg" id="board-view-toggle">
          <button id="bk" class="on">Kanban</button>
          <button id="bg">Graph</button>
        </div>
      </div>
      <div id="kanban" class="center-wrap">
        <div class="cards" id="cards">
          <div class="loading">Loading…</div>
        </div>
      </div>
      <div id="graphwrap" class="graphwrap hidden">
        <svg id="graphSvg" class="graph" viewBox="0 0 700 460" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="gcap">edge = directed peer link · dashed = dangling · <b>green pulse = live delegation</b></div>
      </div>
      <div id="card-detail" class="card-detail hidden"></div>
      <div id="feed" class="feed"></div>
    </main>
    <div class="gutter" data-g="inspect"></div>

    <!-- RIGHT: chat pane (persistent, wired to the last-clicked agent card) -->
    <aside class="pane inspect" id="inspect">
      <div class="info-panel">Select an agent card to start chatting.</div>
    </aside>
  </div>
</div>

<!-- Graph hover tooltip (positioned by JS) -->
<div id="gtip" class="gtip"></div>

<!-- All logic in external files — CSP-safe (no inline scripts) -->
<!-- session-log.js is an ES module (imports result-canvas.js) and exposes
     window.mountSessionLog for app.js (a classic script) to call. -->
<script type="module" src="/session-log.js"></script>
<script src="/app.js"></script>
</body>
</html>
