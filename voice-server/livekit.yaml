# LiveKit config for the box: advertise the tailnet IP so the phone's media (UDP)
# reaches it directly over the tailscale tunnel. Single UDP mux port for easy firewall.
port: 7880
bind_addresses: ["0.0.0.0"]
rtc:
  tcp_port: 7881
  udp_port: 7882
  node_ip: 100.97.133.55        # box tailnet IP — advertised in ICE candidates
  use_external_ip: false
keys:
  devkey: REPLACE_WITH_32CHAR_SECRET   # config-mode requires >=32 chars; pass the same
                                       # value as LIVEKIT_API_SECRET to mint/agent/serve_pwa
