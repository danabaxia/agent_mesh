<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mesh 语音助手</title>
<style>
  :root{--bg:#0a0e14;--panel:#141a23;--line:#1f2733;--fg:#e7edf4;--mut:#8a97a8;--acc:#4ea1ff;--ok:#3fb950;--me:#16324f}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{font:16px/1.55 -apple-system,system-ui,sans-serif;background:var(--bg);color:var(--fg);
       display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
  header{display:flex;align-items:center;gap:10px;padding:14px 16px calc(14px) ;padding-top:calc(14px + env(safe-area-inset-top));
         border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:5}
  header .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
  header h1{font-size:16px;margin:0;flex:1;font-weight:600}
  header button{background:none;border:0;color:var(--mut);font-size:20px;cursor:pointer;padding:4px}
  #thread{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .b{max-width:84%;padding:10px 13px;border-radius:16px;white-space:pre-wrap;word-wrap:break-word;font-size:15px}
  .b.me{align-self:flex-end;background:var(--me);border-bottom-right-radius:5px}
  .b.ai{align-self:flex-start;background:var(--panel);border-bottom-left-radius:5px}
  .b.sys{align-self:center;background:none;color:var(--mut);font-size:12.5px;max-width:92%;text-align:center}
  a.issue{align-self:flex-start;font-size:13px;color:var(--ok);text-decoration:none;background:#10231a;border:1px solid #1f3a26;border-radius:10px;padding:7px 11px}
  .typing{color:var(--mut)}
  footer{border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:var(--bg)}
  .composer{display:flex;align-items:flex-end;gap:8px}
  textarea{flex:1;background:#0e131b;color:var(--fg);border:1px solid var(--line);border-radius:20px;
           padding:11px 15px;font:inherit;resize:none;max-height:30vh;min-height:44px}
  .mic{flex:0 0 auto;width:52px;height:52px;border-radius:50%;border:0;background:var(--acc);color:#04121f;
       font-size:22px;display:grid;place-items:center;cursor:pointer;user-select:none;transition:transform .08s,background .15s}
  .mic:active{transform:scale(.94)}
  .mic.rec{background:#e5484d;color:#fff;box-shadow:0 0 0 6px rgba(229,72,77,.25)}
  .send{flex:0 0 auto;width:52px;height:52px;border-radius:50%;border:0;background:var(--panel);color:var(--fg);font-size:18px;cursor:pointer}
  #status{text-align:center;color:var(--mut);font-size:12px;min-height:16px;margin-top:6px}
  /* settings sheet */
  #sheet{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:10}
  #sheet.on{display:flex}
  .sheet-c{width:100%;background:var(--panel);border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));border:1px solid var(--line)}
  .sheet-c h3{margin:0 0 12px;font-size:14px;color:var(--mut)}
  .sheet-c label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
  select{width:100%;background:#0e131b;color:var(--fg);border:1px solid var(--line);border-radius:10px;padding:11px}
  .sheet-c .row{display:flex;align-items:center;gap:8px;margin-top:12px}
  .sheet-c .done{width:100%;margin-top:16px;background:var(--acc);color:#04121f;border:0;border-radius:10px;padding:12px;font:600 15px inherit}
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1>Mesh 语音助手</h1>
    <button id="gear" aria-label="设置">⚙️</button>
  </header>

  <div id="thread"></div>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="说话或打字…" enterkeyhint="send"></textarea>
      <button class="send" id="send" aria-label="发送">➤</button>
      <button class="mic" id="mic" aria-label="按住说话">🎤</button>
    </div>
    <div id="status"></div>
  </footer>

  <!-- settings: voice + STT precision, tucked away -->
  <div id="sheet"><div class="sheet-c">
    <h3>设置</h3>
    <label>回报声音</label>
    <select id="voice"></select>
    <label>识别语言</label>
    <select id="sttLang">
      <option value="auto">自动(中/英)</option>
      <option value="zh">中文</option>
      <option value="en">English</option>
    </select>
    <label class="row" style="margin-top:14px"><input type="checkbox" id="accurate" style="width:auto"> <span style="font-size:13px">高精度识别(更慢)</span></label>
    <label class="row"><input type="checkbox" id="autospeak" checked style="width:auto"> <span style="font-size:13px">自动朗读回复</span></label>
    <button class="done" id="sheetDone">完成</button>
  </div></div>

  <script src="app.js" type="module"></script>
</body>
</html>
